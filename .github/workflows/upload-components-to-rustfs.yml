name: Upload changed components files to S3

on:
  push:
    branches:
      - main
    paths:
      - 'components/**'

jobs:
  upload-components:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install AWS CLI
        run: |
          aws --version || true
          if ! command -v aws >/dev/null 2>&1; then
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install
          fi
          aws --version

      - name: Find changed files in components
        id: changed
        shell: bash
        run: |
          set -e

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          echo "Before: $BEFORE"
          echo "After : $AFTER"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial push detected"
            git ls-files components > changed_files.txt || true
          else
            git diff --name-only --diff-filter=ACMRT "$BEFORE" "$AFTER" -- components > changed_files.txt || true
          fi

          # Chỉ giữ các file có extension cho phép
          grep -E '\.(txt|js|png)$' changed_files.txt > filtered_files.txt || true
          mv filtered_files.txt changed_files.txt

          echo "Changed files to upload:"
          cat changed_files.txt || true

          if [ ! -s changed_files.txt ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload changed files
        if: steps.changed.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -e

          while IFS= read -r file; do
            [ -f "$file" ] || continue

            ext="${file##*.}"
            ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')

            case "$ext_lower" in
              js)
                content_type="text/javascript"
                ;;
              png)
                content_type="image/png"
                ;;
              txt)
                content_type="text/plain"
                ;;
              *)
                echo "Skip unsupported file type: $file"
                continue
                ;;
            esac

            echo "Uploading: $file -> s3://$S3_BUCKET/$file (Content-Type: $content_type)"

            aws s3 cp "$file" "s3://$S3_BUCKET/$file" \
              --endpoint-url "$S3_ENDPOINT" \
              --content-type "$content_type" \
              --cache-control "no-cache, no-store, must-revalidate" \
              --expires "0" \
              --only-show-errors
          done < changed_files.txt
